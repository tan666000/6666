name: Release APK

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0, v2.0.0-rc1 等版本标签

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Build Release APK (without signing)
        run: ./gradlew assembleRelease
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## WJFakeLocation v${{ steps.get_version.outputs.VERSION }}
            
            ### 🎉 更新内容
            - 自动构建发布
            
            ### 📦 安装包
            - `app-debug.apk` - 调试版本（包含完整日志）
            - `app-release-unsigned.apk` - 未签名 Release 版本
            
            ### ⚠️ 注意事项
            - Release 版本需要手动签名才能安装
            - 建议使用Android Studio 或 jarsigner 进行签名
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
